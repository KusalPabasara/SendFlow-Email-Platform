name: Deploy to DigitalOcean VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 152.42.185.253
          username: kusal # Using your username instead of root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to the project directory or create it safely
            mkdir -p ~/projects/email-platform
            cd ~/projects/email-platform
            
            # Since git clone via HTTPS might be problematic without tokens, 
            # we will just pull if exists, else clone
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            # Install Root Dependencies
            npm install
            
            # Build Frontend
            cd frontend
            npm install
            npm run build
            cd ..
            
            # Setup Backend
            cd backend
            npm install
            
            # Restart or start the PM2 process for backend
            # Make sure you have installed pm2 globally: npm install pm2 -g
            pm2 restart email-backend || pm2 start index.js --name email-backend
            
            # Save PM2 process list
            pm2 save
